name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: salespulse-nyaaa
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build

    - name: Copy frontend build to backend/static
      run: |
        rm -rf backend/static
        cp -r frontend/dist backend/static

    - name: Create deployment package
      working-directory: backend
      run: |
        zip -r ../deploy.zip \
          *.py \
          *.json \
          routers/ \
          gunicorn_conf.py \
          requirements.txt \
          static/
        echo "Package size: $(du -h ../deploy.zip | cut -f1)"

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: deploy.zip

    - name: Verify health
      run: |
        echo "Waiting 180s for Oryx build + app startup..."
        sleep 180

        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 30 \
          "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health")

        echo "Health check: HTTP $STATUS"
        if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "302" ]; then
          echo "App is live at https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        else
          echo "Warning: app returned $STATUS — may still be starting"
        fi
